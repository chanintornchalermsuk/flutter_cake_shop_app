name: flutter_cake_shop_app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2            #ใช้ฟอนต์แปลกๆ จาก fonts.google.com
  font_awesome_flutter: ^11.0.0   #ใช้ไอคอนแปลกๆ จาก fontawesome.com
  url_launcher: ^6.3.2            #ใช้เปิดโทรศัพท์ เปิดเว็บ เปิดแอปฯ
  flutter_map: ^8.2.2             #ใช้แสดงแผนที่จาก openstreetmap.org
  latlong2: ^0.9.1                #ใช้จัดการเรื่องตำแหน่ง latitude/longitude
  carousel_slider: ^5.1.2         #ใช้ทำ Slider (จะแนวตั้ง หรือแนวนอนก็ได้)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0          #ใช้สร้าง ไอคอน ของแอปฯ

icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter:
  uses-material-design: true
  assets:
    -  assets/images/